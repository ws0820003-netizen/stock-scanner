<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>全市場選股終端機</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { background-color: #0b0e14; color: #d1d4dc; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        canvas.drawing-board { cursor: crosshair; background-image: linear-gradient(rgba(42, 46, 57, 0.3) 1px, transparent 1px), linear-gradient(90deg, rgba(42, 46, 57, 0.3) 1px, transparent 1px); background-size: 20px 20px; background-position: center center; touch-action: none; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #131722; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #2a2e39; border-radius: 3px; }
        .glass-panel { background: #131722; border: 1px solid #2a2e39; box-shadow: 0 4px 6px rgba(0, 0, 0, 0.3); }
        .tab-btn.active { background-color: #2962ff; color: white; border-color: #2962ff; }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <header class="bg-[#131722] border-b border-[#2a2e39] p-4 flex justify-between items-center z-10">
        <div class="flex items-center space-x-3">
            <svg class="w-8 h-8 text-blue-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7h8m0 0v8m0-8l-8 8-4-4-6 6"></path></svg>
            <h1 class="text-xl font-bold text-white tracking-wider">AI 智能選股終端機 <span class="text-xs text-blue-400 border border-blue-400 px-2 py-0.5 rounded ml-2">PRO 版</span></h1>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <section class="w-1/2 p-6 flex flex-col border-r border-[#2a2e39] bg-[#0b0e14]">
            
            <div class="flex space-x-2 mb-6">
                <button onclick="switchTab('draw')" id="btn-tab-draw" class="tab-btn active flex-1 py-2 rounded border border-[#2a2e39] text-gray-400 font-semibold transition-colors">🖍️ 手繪型態</button>
                <button onclick="switchTab('volume')" id="btn-tab-volume" class="tab-btn flex-1 py-2 rounded border border-[#2a2e39] text-gray-400 font-semibold transition-colors">🚀 底部爆量反轉</button>
            </div>

            <div id="content-draw" class="flex-1 flex flex-col">
                <div class="mb-4 flex justify-between items-end">
                    <div>
                        <h2 class="text-lg font-semibold text-white mb-1">繪製理想型態</h2>
                        <p class="text-sm text-gray-400">在畫布上畫出走勢，尋找全市場最相似的 K 線。</p>
                    </div>
                    <button id="clearBtn" class="px-4 py-2 bg-[#2a2e39] hover:bg-[#434651] text-white rounded text-sm transition-colors">清除重畫</button>
                </div>
                <div class="flex-1 relative rounded-lg overflow-hidden border-2 border-[#2a2e39] bg-[#131722] mb-4">
                    <canvas id="drawCanvas" class="drawing-board w-full h-full block"></canvas>
                </div>
                <button onclick="scanDrawing()" class="w-full py-3 bg-blue-600 hover:bg-blue-500 text-white font-bold rounded shadow-lg transition-colors text-lg">🔍 開始圖形比對</button>
            </div>

            <div id="content-volume" class="flex-1 flex flex-col hidden">
                <div class="mb-4">
                    <h2 class="text-lg font-semibold text-white mb-2">策略說明：底部爆量反轉</h2>
                    <div class="p-4 bg-[#131722] border border-[#2a2e39] rounded-lg text-sm text-gray-300 space-y-2">
                        <p>✅ 股價呈現**上漲 (紅K)**。</p>
                        <p>✅ 今日成交量大於過去 10 日均量的 **2.5 倍**。</p>
                        <p>✅ 排除成交量極小的冷門股 (大於千張)。</p>
                        <p class="text-blue-400 mt-2 text-xs">適合尋找：主力剛進場、破底翻、碗公底成型之飆股。</p>
                    </div>
                </div>
                <div class="mt-auto">
                    <button onclick="scanVolumeSurge()" class="w-full py-3 bg-red-600 hover:bg-red-500 text-white font-bold rounded shadow-lg transition-colors text-lg">🔥 啟動爆量策略掃描</button>
                </div>
            </div>
        </section>

        <section class="w-1/2 bg-[#0b0e14] p-6 flex flex-col">
            <h2 class="text-lg font-semibold text-white mb-4 border-b border-[#2a2e39] pb-2">掃描結果</h2>

            <div id="loadingState" class="hidden flex-1 flex flex-col items-center justify-center">
                <div class="w-16 h-16 border-4 border-blue-500/20 border-t-blue-500 rounded-full animate-spin mb-4"></div>
                <p class="text-blue-400 animate-pulse text-lg">AI 運算中，請稍候...</p>
            </div>

            <div id="emptyState" class="flex-1 flex flex-col items-center justify-center text-gray-500">
                <svg class="w-16 h-16 mb-4 opacity-20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="1" d="M9.75 17L9 20l-1 1h8l-1-1-.75-3M3 13h18M5 17h14a2 2 0 002-2V5a2 2 0 00-2-2H5a2 2 0 00-2 2v10a2 2 0 002 2z"></path></svg>
                <p>等待策略執行指令...</p>
            </div>

            <div id="resultsList" class="flex-1 overflow-y-auto custom-scrollbar pr-2 hidden space-y-4"></div>
        </section>
    </main>

    <script>
        // API 網址設定 (你的 Render 網址)
        const API_BASE_URL = 'https://my-stock-scanner-api.onrender.com/api';

        // --- Tab 切換邏輯 ---
        function switchTab(tabName) {
            document.getElementById('btn-tab-draw').classList.remove('active');
            document.getElementById('btn-tab-volume').classList.remove('active');
            document.getElementById('content-draw').classList.add('hidden');
            document.getElementById('content-volume').classList.add('hidden');
            
            document.getElementById(`btn-tab-${tabName}`).classList.add('active');
            document.getElementById(`content-${tabName}`).classList.remove('hidden');
        }

        // --- UI 控制 ---
        const loadingState = document.getElementById('loadingState');
        const emptyState = document.getElementById('emptyState');
        const resultsList = document.getElementById('resultsList');

        function showLoading() {
            emptyState.classList.add('hidden');
            resultsList.classList.add('hidden');
            loadingState.classList.remove('hidden');
        }

        // --- 策略 1：手繪掃描 ---
        const canvas = document.getElementById('drawCanvas');
        const ctx = canvas.getContext('2d');
        let isDrawing = false, points = [];

        function resizeCanvas() {
            const rect = canvas.parentElement.getBoundingClientRect();
            canvas.width = rect.width; canvas.height = rect.height; redraw();
        }
        window.addEventListener('resize', resizeCanvas); resizeCanvas();

        function getMousePos(evt) {
            const rect = canvas.getBoundingClientRect();
            let clientX = evt.clientX || (evt.touches && evt.touches[0].clientX);
            let clientY = evt.clientY || (evt.touches && evt.touches[0].clientY);
            return { x: clientX - rect.left, y: clientY - rect.top };
        }

        function startDrawing(e) { e.preventDefault(); isDrawing = true; points = [getMousePos(e)]; ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y); }
        function draw(e) {
            e.preventDefault();
            if (!isDrawing) return;
            const pos = getMousePos(e);
            if (pos.x > points[points.length - 1].x + 2) { 
                points.push(pos); ctx.lineTo(pos.x, pos.y);
                ctx.strokeStyle = '#2962ff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
            }
        }
        function stopDrawing(e) { e.preventDefault(); isDrawing = false; }
        
        function redraw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            if (points.length < 2) return;
            ctx.beginPath(); ctx.moveTo(points[0].x, points[0].y);
            points.forEach(p => ctx.lineTo(p.x, p.y));
            ctx.strokeStyle = '#2962ff'; ctx.lineWidth = 4; ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
        }

        document.getElementById('clearBtn').addEventListener('click', () => { points = []; redraw(); });
        
        canvas.addEventListener('mousedown', startDrawing); canvas.addEventListener('mousemove', draw);
        canvas.addEventListener('mouseup', stopDrawing); canvas.addEventListener('mouseout', stopDrawing);
        canvas.addEventListener("touchstart", startDrawing, { passive: false });
        canvas.addEventListener("touchmove", draw, { passive: false });
        canvas.addEventListener("touchend", stopDrawing, { passive: false });

        function getNormalizedPattern() {
            if (points.length < 5) return null;
            const minX = points[0].x, maxX = points[points.length - 1].x, width = maxX - minX;
            const normalizedY = [];
            for (let i = 0; i < 60; i++) {
                const targetX = minX + (width * i / 59);
                let left = points[0], right = points[points.length - 1];
                for (let j = 0; j < points.length - 1; j++) {
                    if (points[j].x <= targetX && points[j+1].x >= targetX) { left = points[j]; right = points[j+1]; break; }
                }
                let y = (right.x === left.x) ? left.y : left.y + ((targetX - left.x) / (right.x - left.x)) * (right.y - left.y);
                normalizedY.push(y);
            }
            const minY = Math.min(...normalizedY), range = Math.max(...normalizedY) - minY || 1;
            return normalizedY.map(y => 1 - ((y - minY) / range));
        }

        async function scanDrawing() {
            const pattern = getNormalizedPattern();
            if (!pattern) return alert('請先畫出走勢！');
            showLoading();
            try {
                const res = await fetch(`${API_BASE_URL}/scan`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ pattern })
                });
                renderResults(await res.json(), 'draw');
            } catch (err) { alert('伺服器連線失敗！'); location.reload(); }
        }

        // --- 策略 2：底部爆量掃描 ---
        async function scanVolumeSurge() {
            showLoading();
            try {
                const res = await fetch(`${API_BASE_URL}/scan_volume_surge`, { method: 'POST' });
                renderResults(await res.json(), 'volume');
            } catch (err) { alert('伺服器連線失敗！'); location.reload(); }
        }

        // --- 共用：渲染結果圖表 ---
        function renderResults(data, type) {
            loadingState.classList.add('hidden');
            resultsList.innerHTML = '';
            
            if (data.status !== 'success' || data.matches.length === 0) {
                resultsList.innerHTML = `<div class="text-center text-gray-500 py-10">找不到符合條件的股票</div>`;
                resultsList.classList.remove('hidden');
                return;
            }

            data.matches.forEach((stock, index) => {
                const card = document.createElement('div');
                card.className = 'glass-panel rounded-lg p-4 transition-transform hover:-translate-y-1 hover:border-[#434651]';
                
                // 根據策略決定分數徽章的顯示方式
                let badgeHtml = '';
                let lineColor = '#2962ff'; // 預設藍色
                
                if (type === 'draw') {
                    badgeHtml = `<span class="text-xs text-gray-400 mr-2">相似度</span><span class="text-sm font-bold text-green-400">${stock.score}%</span>`;
                } else if (type === 'volume') {
                    badgeHtml = `<span class="text-xs text-gray-400 mr-2">爆發</span><span class="text-sm font-bold text-red-500">${stock.score} 倍量</span>`;
                    lineColor = '#ef4444'; // 爆量策略用紅色線
                }

                card.innerHTML = `
                    <div class="flex justify-between items-center mb-3">
                        <div class="flex items-baseline space-x-2">
                            <span class="text-lg font-bold text-white">${stock.code}</span>
                            <span class="text-sm text-gray-400">${stock.name}</span>
                        </div>
                        <div class="flex items-center bg-[#1e222d] px-3 py-1 rounded-full border border-[#2a2e39]">
                            ${badgeHtml}
                        </div>
                    </div>
                    <div class="h-32 w-full relative"><canvas id="chart-${type}-${index}"></canvas></div>
                    <div class="mt-3 flex justify-end">
                        <span class="text-xs text-gray-400">最新收盤價: <span class="text-white">$${stock.prices[stock.prices.length-1].toFixed(2)}</span></span>
                    </div>
                `;
                resultsList.appendChild(card);
                
                // 畫圖
                const ctx = document.getElementById(`chart-${type}-${index}`).getContext('2d');
                new Chart(ctx, {
                    type: 'line',
                    data: {
                        labels: Array.from({length: 60}, (_, i) => i),
                        datasets: [{
                            data: stock.prices, borderColor: lineColor, borderWidth: 2, pointRadius: 0, tension: 0.1
                        }]
                    },
                    options: {
                        responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } },
                        scales: { x: { display: false }, y: { display: true, position: 'right', grid: { color: '#1e222d' } } }
                    }
                });
            });
            resultsList.classList.remove('hidden');
        }
    </script>
</body>
</html>
